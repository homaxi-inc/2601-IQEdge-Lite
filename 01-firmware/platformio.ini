; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html

; HIL / 联调：60 s 上报（默认 esp32dev，无 G2_PRODUCTION_BUILD）
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_port = COM3
monitor_filters = esp32_exception_decoder
upload_port = COM3
board_build.filesystem = littlefs
board_build.partitions = partitions/default_4MB_littlefs.csv
extra_scripts = pre:inject_env.py
build_flags =
	-DCORE_DEBUG_LEVEL=3
	-DDEBUG_ESP_WIFI
	-DMQTT_MAX_PACKET_SIZE=2048
lib_deps =
	bblanchon/ArduinoJson@^6.21.3
	knolleary/PubSubClient@^2.8
	https://github.com/cterwilliger/VeDirectFrameHandler.git
	arduino-libraries/Arduino_JSON@^0.2.0
	mikalhart/TinyGPSPlus@^1.0.3
upload_protocol = esptool
upload_speed = 921600

; 正式生产：300 s NORMAL 上报（pio run -e esp32prod）
[env:esp32prod]
extends = env:esp32dev
build_flags =
	${env:esp32dev.build_flags}
	-DG2_PRODUCTION_BUILD=1
